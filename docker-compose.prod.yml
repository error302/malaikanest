version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: malaikanest
      POSTGRES_USER: malaika
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_this_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U malaika"]
      interval: 5s
      retries: 5

  # Redis for caching and sessions
  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  # Backend - Django API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: always
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: "postgresql://malaika:${POSTGRES_PASSWORD:-change_this_password}@db:5432/malaikanest"
      REDIS_URL: "redis://redis:6379/0"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - backend_media:/app/media
      - staticfiles:/app/staticfiles

  # Frontend - Next.js
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:8000"
      NODE_ENV: "production"
    ports:
      - "3000:3000"
    depends_on:
      - backend

  # Nginx - Reverse Proxy
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deployment/nginx-production.conf:/etc/nginx/conf.d/default.conf
      - staticfiles:/usr/share/nginx/html/static
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
  redis_data:
  staticfiles:
  backend_media:
