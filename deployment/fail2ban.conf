# ============================================================
# Fail2Ban Configuration — Malaika Nest
# Install:
#   sudo cp deployment/fail2ban.conf /etc/fail2ban/jail.local
#   sudo systemctl reload fail2ban
#   sudo fail2ban-client status          # verify all jails listed
# ============================================================

[DEFAULT]
# Global defaults — individual jails can override
bantime  = 1h
findtime = 10m
maxretry = 5
backend  = systemd
banaction = ufw

# ── SSH ──────────────────────────────────────────────────────────────────────
[sshd]
enabled  = true
port     = ssh
logpath  = /var/log/auth.log
maxretry = 5

# ── Nginx: HTTP Basic Auth brute-force ───────────────────────────────────────
[nginx-http-auth]
enabled  = true
port     = http,https
logpath  = /var/log/nginx/error.log

# ── Nginx: Rate-limited endpoints (DRF throttle + nginx limit_req) ───────────
# Catches IPs that trip nginx's limit_req_zone (429 / "limiting requests")
[nginx-limit-req]
enabled  = true
port     = http,https
logpath  = /var/log/nginx/error.log
maxretry = 10

# ── Nginx: Bot/scanner detection ─────────────────────────────────────────────
[nginx-botsearch]
enabled  = true
port     = http,https
logpath  = /var/log/nginx/access.log
maxretry = 3

# ── M-Pesa STK Push Abuse Detection ─────────────────────────────────────────
# Bans IPs that send more than 20 requests to the M-Pesa payment endpoints
# within 60 seconds.  This protects against:
#   • Automated STK push flooding (wasted Safaricom API quota)
#   • Enumeration attacks on the payment endpoint
#   • Denial-of-wallet — triggering hundreds of STK prompts on real users
#
# Filter matches nginx "limiting requests" log lines for the payment path.
# Nginx must have a limit_req_zone named "api_payments" (see nginx-production.conf).
#
# Verify after deploy:
#   sudo fail2ban-client status malaikanest-mpesa-abuse
[malaikanest-mpesa-abuse]
enabled  = true
port     = http,https
filter   = nginx-limit-req
logpath  = /var/log/nginx/malaikanest-error.log
# Allow a short burst (Safaricom callbacks can retry rapidly), then ban hard.
findtime = 60
maxretry = 20
bantime  = 24h
# Log payment abuse bans separately for audit trail
action   = ufw[name=mpesa-abuse, port="http,https", protocol=tcp]
           sendmail-whois-lines[name=mpesa-abuse, dest=alerts@malaikanest.duckdns.org, sender=fail2ban@malaikanest.duckdns.org, sendername="Malaika Nest Fail2Ban"]

# ── Recidive: Ban repeat offenders for 7 days ────────────────────────────────
[recidive]
enabled   = true
logpath   = /var/log/fail2ban.log
banaction = ufw
bantime   = 7d
findtime  = 1d
maxretry  = 5