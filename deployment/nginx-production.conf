# Nginx Production Configuration — Malaika Nest
# Install: sudo cp this /etc/nginx/sites-available/malaikanest
#          sudo ln -sf /etc/nginx/sites-available/malaikanest /etc/nginx/sites-enabled/malaikanest
#          sudo nginx -t && sudo systemctl reload nginx

# ─── Rate Limiting Zones ─────────────────────────────────────────────────────
# These MUST be in http{} context — place in /etc/nginx/nginx.conf or conf.d/rate-limits.conf
# limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/s;
# limit_req_zone $binary_remote_addr zone=api_payments:10m rate=10r/m;
# limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=5r/m;
# limit_req_zone $binary_remote_addr zone=api_products:10m rate=60r/s;

# ─── Upstream Definitions ─────────────────────────────────────────────────────
upstream backend {
    server unix:/run/gunicorn/malaikanest.sock fail_timeout=0;
}

upstream frontend {
    server 127.0.0.1:3000 fail_timeout=0;
}

# ─── HTTP → HTTPS Redirect ───────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name malaikanest.duckdns.org www.malaikanest.duckdns.org;

    # Allow Certbot ACME challenge through
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS Main Server ────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name malaikanest.duckdns.org www.malaikanest.duckdns.org;

    # ── TLS Config ───────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/malaikanest.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/malaikanest.duckdns.org/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/malaikanest.duckdns.org/chain.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # ── General Settings ─────────────────────────────────────────────────────
    server_tokens off;
    client_max_body_size 10m;

    # ── Timeouts ─────────────────────────────────────────────────────────────
    proxy_connect_timeout 60s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;
    send_timeout          60s;

    # ── Security Headers ─────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ── GZip Compression ─────────────────────────────────────────────────────
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_proxied any;
    gzip_types
        application/javascript application/json application/xml
        text/css text/javascript text/plain text/xml
        image/svg+xml;

    # ── Log Paths ────────────────────────────────────────────────────────────
    access_log /var/log/nginx/malaikanest-access.log;
    error_log  /var/log/nginx/malaikanest-error.log warn;

    # ─────────────────────────────────────────────────────────────────────────
    # PAYMENTS — Stricter rate limiting for M-Pesa endpoints
    # ─────────────────────────────────────────────────────────────────────────
    location /api/v1/payments/ {
        limit_req zone=api_payments burst=5 nodelay;

        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
    }

    # M-Pesa callback — no rate limit (Safaricom sends this), no auth check
    location /api/v1/payments/mpesa/callback/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ─────────────────────────────────────────────────────────────────────────
    # AUTHENTICATION — Rate limited
    # ─────────────────────────────────────────────────────────────────────────
    location ~ ^/api/(v1/)?accounts/(token|register|password) {
        limit_req zone=auth_zone burst=10 nodelay;

        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─────────────────────────────────────────────────────────────────────────
    # DJANGO STATIC FILES — served directly from disk (fast)
    # ─────────────────────────────────────────────────────────────────────────
    location /static/ {
        alias /var/www/malaikanest/backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        gzip_static on;
        # Security: block server-side script execution in static dir
        location ~* \.(php|py|pl|sh|cgi)$ { deny all; }
    }

    # ─────────────────────────────────────────────────────────────────────────
    # MEDIA FILES (served from disk if not using Cloudinary)
    # Comment this out if all images are stored on Cloudinary
    # ─────────────────────────────────────────────────────────────────────────
    location /media/ {
        alias /var/www/malaikanest/backend/media/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        add_header X-Content-Type-Options "nosniff" always;
        location ~* \.(php|py|pl|sh|cgi)$ { deny all; }
    }

    # ─────────────────────────────────────────────────────────────────────────
    # ADMIN — Admin panel at configurable path (not /admin/)
    # ─────────────────────────────────────────────────────────────────────────
    location /manage-store/ {
        limit_req zone=auth_zone burst=10 nodelay;

        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
    }

    # ─────────────────────────────────────────────────────────────────────────
    # DJANGO API — General backend proxy
    # ─────────────────────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_general burst=50 nodelay;

        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
    }

    # ─────────────────────────────────────────────────────────────────────────
    # NEXT.JS STATIC ASSETS — Cache aggressively
    # ─────────────────────────────────────────────────────────────────────────
    location /_next/static/ {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
        expires 1y;
    }

    location /images/ {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # ─────────────────────────────────────────────────────────────────────────
    # FRONTEND — Next.js (catch-all)
    # ─────────────────────────────────────────────────────────────────────────
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade     $http_upgrade;
        proxy_set_header Connection  'upgrade';
        proxy_set_header Host        $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
